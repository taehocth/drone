services:
  db:
    # 개발 환경에서만 헬스체크 유지 (선택)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  backend:
    environment:
      # 개발 편의용 (필요 없으면 제거 가능)
      LOG_LEVEL: debug

  frontend:
    ports:
      # 개발 중 직접 접근도 가능하게 열어둠 (선택)
      - "5173:5173"
    environment:
      # nginx 기준 상대 경로
      VITE_API_URL: /api/v1
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WSL_USE_POLLING: "true"
