services:
  proxy:
    image: traefik:3.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    command:
      - --providers.docker
      - --providers.docker.constraints=Label("traefik.constraint-label","traefik-public")
      - --providers.docker.exposedbydefault=false
      - --entrypoints.http.address=:80
      - --accesslog
      - --log
      - --log.level=DEBUG
      - --api
      - --api.insecure=true
    labels:
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
    networks:
      - traefik-public
      - default

  db:
    image: postgres:12
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env

  adminer:
    image: adminer
    restart: always
    depends_on:
      - db
    environment:
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.adminer-http.rule=Host(`adminer.localhost`)
      - traefik.http.routers.adminer-http.entrypoints=http
      - traefik.http.services.adminer.loadbalancer.server.port=8080

  backend:
    build:
      context: ./backend
    image: 'drone-backend:latest'
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]   # ✅ 수정
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.backend.loadbalancer.server.port=8000
      - traefik.http.routers.backend-http.rule=Host(`api.localhost`)
      - traefik.http.routers.backend-http.entrypoints=http

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    env_file:
      - .env
    environment:
      VITE_API_URL: http://api.localhost   # ✅ 수정
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.frontend-http.rule=Host(`localhost`)
      - traefik.http.routers.frontend-http.entrypoints=http
      - traefik.http.services.frontend.loadbalancer.server.port=5173
    networks:
      - traefik-public

volumes:
  app-db-data:

networks:
  traefik-public:
    external: false
